<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DC1 Fuel Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D2B4E;
    --blue: #1A5C96;
    --ocean: #2980B9;
    --foam: #EAF3FB;
    --wave: #C8DFF2;
    --gold: #C49A28;
    --red: #C0392B;
    --green: #27AE60;
    --gray: #6B7280;
    --light: #F7FAFC;
    --white: #FFFFFF;
    --text: #1A202C;
    --budget: 2400;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--navy);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 16px 20px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .logo { color: var(--white); font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--gold); }
  .date-btn {
    background: rgba(255,255,255,0.1); border: none; color: var(--white);
    font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 12px;
    border-radius: 20px; cursor: pointer; letter-spacing: 0.5px;
  }

  /* BUDGET RING */
  .budget-section {
    background: rgba(255,255,255,0.05);
    border-radius: 16px 16px 0 0;
    padding: 16px 20px;
  }
  .budget-row {
    display: flex; align-items: center; gap: 16px;
  }
  .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
  .ring-fill { fill: none; stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1), stroke 0.3s; }
  .ring-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--white); }
  .ring-label { font-size: 8px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }

  .budget-stats { flex: 1; }
  .budget-main {
    display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px;
  }
  .cal-consumed { font-size: 32px; font-weight: 800; color: var(--white); line-height: 1; }
  .cal-sep { color: rgba(255,255,255,0.3); font-size: 20px; }
  .cal-budget { font-size: 20px; color: rgba(255,255,255,0.5); }
  .cal-unit { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  .budget-remaining {
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 3px 8px; border-radius: 10px; display: inline-block;
  }
  .budget-bar {
    height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px;
    margin-top: 10px; overflow: hidden;
  }
  .budget-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background 0.3s;
  }

  /* MACRO PILLS */
  .macro-row {
    display: flex; gap: 8px; padding: 10px 20px;
    background: rgba(255,255,255,0.03);
  }
  .macro-pill {
    flex: 1; background: rgba(255,255,255,0.06); border-radius: 10px;
    padding: 8px 6px; text-align: center;
  }
  .macro-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: var(--white); }
  .macro-lbl { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* MAIN CONTENT */
  .main { background: var(--light); border-radius: 20px 20px 0 0; min-height: 60vh; }

  /* TABS */
  .tabs {
    display: flex; background: var(--white);
    border-bottom: 1px solid #E5EAF0;
    border-radius: 20px 20px 0 0; overflow: hidden;
  }
  .tab {
    flex: 1; padding: 14px 8px; text-align: center; font-size: 12px;
    font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
    cursor: pointer; border: none; background: none; color: var(--gray);
    transition: all 0.2s; border-bottom: 3px solid transparent;
  }
  .tab.active { color: var(--navy); border-bottom-color: var(--ocean); }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* LOG PANEL */
  .log-section { padding: 16px; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--gray); }
  .meal-group { margin-bottom: 16px; }
  .meal-group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; background: var(--foam); border-radius: 10px;
    margin-bottom: 4px; cursor: pointer;
  }
  .meal-group-name { font-size: 13px; font-weight: 700; color: var(--navy); }
  .meal-group-cal { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ocean); }
  .meal-group-add {
    background: var(--ocean); color: var(--white); border: none;
    width: 24px; height: 24px; border-radius: 50%; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .food-entry {
    display: flex; align-items: center; padding: 10px 12px;
    background: var(--white); border-radius: 8px; margin-bottom: 3px;
    border-left: 3px solid transparent; animation: slideIn 0.2s ease;
  }
  .food-entry.dense { border-left-color: var(--gold); }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .food-entry-info { flex: 1; min-width: 0; }
  .food-entry-name { font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .food-entry-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gray); margin-top: 1px; }
  .food-entry-cal { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500;
    color: var(--navy); margin-right: 8px; flex-shrink: 0; }
  .food-entry-del {
    background: none; border: none; color: #CCC; font-size: 16px;
    cursor: pointer; padding: 2px 4px; flex-shrink: 0;
    transition: color 0.2s;
  }
  .food-entry-del:hover { color: var(--red); }
  .dense-tag {
    font-size: 9px; background: #FEF3C7; color: #92400E;
    padding: 1px 5px; border-radius: 4px; margin-left: 6px;
    font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
  }
  .empty-meal { padding: 12px; text-align: center; color: var(--gray);
    font-size: 12px; font-style: italic; }

  /* JOURNAL */
  .journal-area {
    margin: 0 16px 16px;
  }
  .journal-box {
    width: 100%; padding: 12px; border: 1.5px solid #E5EAF0;
    border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 13px;
    color: var(--text); resize: none; outline: none; background: var(--white);
    transition: border-color 0.2s;
  }
  .journal-box:focus { border-color: var(--ocean); }
  .journal-save {
    margin-top: 8px; background: var(--navy); color: var(--white);
    border: none; border-radius: 10px; padding: 10px 20px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; width: 100%; transition: background 0.2s;
  }
  .journal-save:hover { background: var(--blue); }
  .journal-entries { margin-top: 12px; }
  .journal-entry {
    background: var(--white); border-radius: 10px; padding: 12px;
    margin-bottom: 8px; border-left: 3px solid var(--ocean);
    animation: slideIn 0.2s ease;
  }
  .journal-entry-date { font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--gray); margin-bottom: 4px; }
  .journal-entry-rhr { font-family: 'DM Mono', monospace; font-size: 11px;
    background: var(--foam); padding: 2px 6px; border-radius: 6px;
    color: var(--navy); margin-left: 8px; }
  .journal-entry-text { font-size: 13px; color: var(--text); line-height: 1.4; }

  /* SEARCH PANEL */
  .search-container { padding: 16px; }
  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-input {
    width: 100%; padding: 12px 16px 12px 42px;
    border: 2px solid #E5EAF0; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 14px; outline: none;
    background: var(--white); transition: border-color 0.2s; color: var(--text);
  }
  .search-input:focus { border-color: var(--ocean); }
  .search-icon { position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%); color: var(--gray); font-size: 16px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid #E5EAF0;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    cursor: pointer; background: var(--white); color: var(--gray);
    transition: all 0.2s; letter-spacing: 0.3px;
  }
  .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .results-list { max-height: 55vh; overflow-y: auto; }
  .result-item {
    display: flex; align-items: center; padding: 11px 12px;
    background: var(--white); border-radius: 10px; margin-bottom: 5px;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all 0.15s; border-left: 3px solid transparent;
  }
  .result-item:hover { border-color: var(--ocean); transform: translateX(2px); }
  .result-item.dense-item { border-left-color: var(--gold); }
  .result-info { flex: 1; min-width: 0; }
  .result-name { font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--gray); margin-top: 2px; }
  .result-cal { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500;
    color: var(--navy); margin-left: 8px; flex-shrink: 0; }
  .result-add {
    background: var(--ocean); color: var(--white); border: none;
    width: 28px; height: 28px; border-radius: 50%; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-left: 8px; flex-shrink: 0; transition: background 0.2s;
  }
  .result-add:hover { background: var(--navy); }

  /* MEAL SELECTOR MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    align-items: flex-end; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 20px 20px 0 0;
    padding: 20px; width: 100%; max-width: 480px; margin: 0 auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-title { font-size: 16px; font-weight: 800; color: var(--navy);
    margin-bottom: 16px; }
  .modal-food-name { font-size: 14px; color: var(--gray); margin-bottom: 16px;
    font-family: 'DM Mono', monospace; }
  .meal-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .meal-opt-btn {
    padding: 12px; border: 2px solid #E5EAF0; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; background: var(--white); color: var(--navy);
    transition: all 0.15s; text-align: center;
  }
  .meal-opt-btn:hover, .meal-opt-btn.selected { background: var(--navy); color: var(--white); border-color: var(--navy); }
  .qty-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .qty-label { font-size: 13px; font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .qty-stepper {
    display: flex; align-items: center; gap: 0;
    border: 2px solid #E5EAF0; border-radius: 12px; overflow: hidden;
    flex-shrink: 0;
  }
  .qty-btn {
    background: var(--foam); border: none; color: var(--navy);
    font-size: 22px; font-weight: 700; line-height: 1;
    width: 44px; height: 44px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .qty-btn:active { background: var(--wave); }
  .qty-input {
    width: 52px; padding: 0; border: none; border-left: 1.5px solid #E5EAF0;
    border-right: 1.5px solid #E5EAF0;
    font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700;
    text-align: center; outline: none; color: var(--navy);
    background: var(--white); height: 44px;
  }
  .qty-cal { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--ocean); flex: 1; text-align: right; }
  .modal-confirm {
    width: 100%; padding: 14px; background: var(--navy); color: var(--white);
    border: none; border-radius: 12px; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer; transition: background 0.2s;
  }
  .modal-confirm:hover { background: var(--ocean); }
  .modal-cancel {
    width: 100%; padding: 10px; background: none; color: var(--gray);
    border: none; font-family: 'Syne', sans-serif; font-size: 13px;
    cursor: pointer; margin-top: 6px;
  }

  /* BUDGET SETTINGS */
  .settings-area { padding: 16px; }
  .settings-card { background: var(--white); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .settings-title { font-size: 14px; font-weight: 800; color: var(--navy); margin-bottom: 12px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; }
  .settings-label { font-size: 13px; color: var(--text); }
  .settings-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ocean); }
  .settings-input {
    width: 100px; padding: 8px 12px; border: 2px solid #E5EAF0;
    border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 14px;
    text-align: center; outline: none; color: var(--text);
  }
  .settings-input:focus { border-color: var(--ocean); }
  .settings-save {
    width: 100%; padding: 12px; background: var(--navy); color: var(--white);
    border: none; border-radius: 10px; font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 800; cursor: pointer;
  }

  /* DENSITY INDICATOR */
  .density-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    margin-right: 8px;
  }
  .density-ok { background: var(--green); }
  .density-warn { background: var(--gold); }

  /* SURF BONUS */
  .surf-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: rgba(41,128,185,0.08);
    margin: 0 16px 12px; border-radius: 10px;
    border-left: 3px solid var(--ocean);
  }
  .surf-label { font-size: 12px; color: var(--blue); flex: 1; }
  .surf-cal { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--ocean); font-weight: 500; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--navy); color: var(--white); padding: 10px 20px;
    border-radius: 30px; font-size: 13px; font-weight: 700;
    z-index: 300; transition: transform 0.3s ease; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* HISTORY */
  .history-item {
    background: var(--white); border-radius: 12px; padding: 14px;
    margin-bottom: 8px; cursor: pointer; transition: transform 0.15s;
  }
  .history-item:hover { transform: translateX(3px); }
  .history-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray); }
  .history-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .history-cal { font-size: 18px; font-weight: 800; color: var(--navy); }
  .history-bar { height: 4px; background: #E5EAF0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .history-bar-fill { height: 100%; border-radius: 2px; background: var(--ocean); }
  .history-note { font-size: 12px; color: var(--gray); margin-top: 6px; font-style: italic; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo">DC<span>1</span> FUEL</div>
    <button class="date-btn" id="dateBtnTop" onclick="showDatePicker()">TODAY</button>
  </div>
  <div class="budget-section">
    <div class="budget-row">
      <div class="ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="30"/>
          <circle class="ring-fill" id="ringFill" cx="36" cy="36" r="30"
            stroke-dasharray="188.5" stroke-dashoffset="188.5" stroke="#2980B9"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ringPct">0%</div>
          <div class="ring-label">used</div>
        </div>
      </div>
      <div class="budget-stats">
        <div class="budget-main">
          <div class="cal-consumed" id="calConsumed">0</div>
          <div class="cal-sep">/</div>
          <div class="cal-budget" id="calBudgetDisplay">2400</div>
          <div class="cal-unit">KCAL</div>
        </div>
        <span class="budget-remaining" id="budgetRemaining" style="background:rgba(39,174,96,0.2);color:#27AE60">2400 remaining</span>
        <div class="budget-bar">
          <div class="budget-bar-fill" id="budgetBarFill" style="width:0%;background:var(--green)"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="macro-row">
    <div class="macro-pill">
      <div class="macro-val" id="surfCalDisplay">0</div>
      <div class="macro-lbl">🏄 Surf</div>
    </div>
    <div class="macro-pill">
      <div class="macro-val" id="proteinDisplay">0g</div>
      <div class="macro-lbl">Protein</div>
    </div>
    <div class="macro-pill">
      <div class="macro-val" id="fiberDisplay">0g</div>
      <div class="macro-lbl">Fiber</div>
    </div>
    <div class="macro-pill">
      <div class="macro-val" id="alcCalDisplay">0</div>
      <div class="macro-lbl">🍷 Alc</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="tabs">
    <button class="tab active" onclick="showTab('log')">LOG</button>
    <button class="tab" onclick="showTab('search')">ADD FOOD</button>
    <button class="tab" onclick="showTab('journal')">JOURNAL</button>
    <button class="tab" onclick="showTab('history')">HISTORY</button>
  </div>

  <!-- LOG PANEL -->
  <div class="panel active" id="panel-log">
    <div class="log-section">
      <div id="mealGroups"></div>
    </div>
  </div>

  <!-- SEARCH PANEL -->
  <div class="panel" id="panel-search">
    <div class="search-container">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text"
          placeholder="Search 407 foods…" oninput="filterFoods()" autocomplete="off">
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-cls="All" onclick="setFilter(this,'All')">All</button>
        <button class="filter-btn" data-cls="Protein" onclick="setFilter(this,'Protein')">Protein</button>
        <button class="filter-btn" data-cls="Carb" onclick="setFilter(this,'Carb')">Carb</button>
        <button class="filter-btn" data-cls="Fat" onclick="setFilter(this,'Fat')">Fat</button>
        <button class="filter-btn" data-cls="Alcohol" onclick="setFilter(this,'Alcohol')">Alcohol</button>
        <button class="filter-btn" data-cls="Drink" onclick="setFilter(this,'Drink')">Drink</button>
        <button class="filter-btn" data-cls="Exercise" onclick="setFilter(this,'Exercise')">Exercise</button>
      </div>
      <div class="results-list" id="resultsList"></div>
    </div>
  </div>

  <!-- JOURNAL PANEL -->
  <div class="panel" id="panel-journal">
    <div class="journal-area">
      <div style="margin-bottom:10px">
        <div class="section-title" style="padding:12px 0 8px">Daily Log Entry</div>
        <textarea class="journal-box" id="journalText" rows="4"
          placeholder="e.g. RHR spike — stayed up late, two glasses of wine. Felt slight cold symptoms. Surf 65 min."></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin:6px 0">
          <span style="font-size:12px;color:var(--gray)">RHR today:</span>
          <input type="number" id="rhrInput" placeholder="bpm" min="35" max="100"
            style="width:70px;padding:6px 10px;border:1.5px solid #E5EAF0;border-radius:8px;font-family:'DM Mono',monospace;font-size:13px;outline:none;color:var(--text)">
        </div>
        <button class="journal-save" onclick="saveJournal()">Save Entry</button>
      </div>
      <div class="section-title" style="padding:8px 0">Recent Entries</div>
      <div class="journal-entries" id="journalEntries"></div>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div class="panel" id="panel-history">
    <div style="padding:16px">
      <div class="section-title" style="margin-bottom:12px">7-Day History</div>

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function loadState() {
  try {
    const saved = localStorage.getItem('dc1_state');
    if (saved) {
      const s = JSON.parse(saved);
      state = { ...state, ...s };
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('dc1_state', JSON.stringify(state)); } catch(e) {}
}

// ─── INIT ────────────────────────────────────────────────────────────────
loadState();
state.date = todayStr();
if (!state.log) state.log = {};
if (!state.log[state.date]) {
  state.log[state.date] = { Breakfast:[], Lunch:[], Dinner:[], Snack:[] };
}
renderAll();
filterFoods();

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderAll() {
  renderBudget();
  renderMealGroups();
  renderHistory();
  renderJournal();
  updateDateBtn();
}

function updateDateBtn() {
  const today = todayStr();
  const d = new Date(state.date + 'T12:00:00');
  const label = state.date === today ? 'TODAY' :
    d.toLocaleDateString('en-US', { month:'short', day:'numeric' }).toUpperCase();
  document.getElementById('dateBtnTop').textContent = label;
}

function renderBudget() {
  const dayLog = state.log[state.date] || {};
  let totalCal = 0, surfCal = 0, protein = 0, fiber = 0, alcCal = 0;

  Object.values(dayLog).forEach(entries => {
    entries.forEach(e => {
      const cal = e.cal * e.qty;
      if (e.class === 'Exercise') {
        surfCal += Math.abs(cal);
      } else {
        totalCal += cal;
        protein += (e.protein || 0) * e.qty;
        fiber += (e.fiber || 0) * e.qty;
        if (e.class === 'Alcohol') alcCal += cal;
      }
    });
  });

  const effectiveBudget = state.budget + surfCal;
  const pct = Math.min(100, (totalCal / effectiveBudget) * 100);
  const remaining = effectiveBudget - totalCal;
  const circ = 188.5;
  const offset = circ - (pct / 100) * circ;

  document.getElementById('calConsumed').textContent = Math.round(totalCal);
  document.getElementById('calBudgetDisplay').textContent = Math.round(effectiveBudget);
  document.getElementById('ringPct').textContent = Math.round(pct) + '%';

  const ring = document.getElementById('ringFill');
  ring.style.strokeDashoffset = offset;

  let color = '#27AE60';
  if (pct > 90) color = '#C0392B';
  else if (pct > 75) color = '#E67E22';
  ring.style.stroke = color;

  const remEl = document.getElementById('budgetRemaining');
  if (remaining < 0) {
    remEl.style.background = 'rgba(192,57,43,0.15)';
    remEl.style.color = '#C0392B';
    remEl.textContent = `${Math.abs(Math.round(remaining))} over budget`;
  } else {
    remEl.style.background = 'rgba(39,174,96,0.15)';
    remEl.style.color = '#27AE60';
    remEl.textContent = `${Math.round(remaining)} remaining`;
  }

  const bar = document.getElementById('budgetBarFill');
  bar.style.width = pct + '%';
  bar.style.background = color;

  document.getElementById('surfCalDisplay').textContent = Math.round(surfCal);
  document.getElementById('proteinDisplay').textContent = Math.round(protein) + 'g';
  document.getElementById('fiberDisplay').textContent = Math.round(fiber) + 'g';
  document.getElementById('alcCalDisplay').textContent = Math.round(alcCal);
}

function renderMealGroups() {
  const meals = ['Breakfast','Lunch','Dinner','Snack'];
  const dayLog = state.log[state.date] || {};
  let html = '';

  meals.forEach(meal => {
    const entries = dayLog[meal] || [];
    const mealCal = entries.reduce((s,e) => s + (e.class === 'Exercise' ? 0 : e.cal * e.qty), 0);
    const entryHtml = entries.length === 0
      ? `<div class="empty-meal">Nothing logged yet</div>`
      : entries.map((e,i) => {
          const isDense = e.dense;
          const calDisplay = e.class === 'Exercise'
            ? `−${Math.abs(Math.round(e.cal * e.qty))}`
            : `+${Math.round(e.cal * e.qty)}`;
          const denseTag = isDense ? `<span class="dense-tag">⚠ ${e.density} cal/g</span>` : '';
          const servingLabel = e.qty !== 1 ? ` ×${e.qty}` : '';
          return `<div class="food-entry ${isDense ? 'dense' : ''}">
            <div class="density-dot ${isDense ? 'density-warn' : 'density-ok'}"></div>
            <div class="food-entry-info">
              <div class="food-entry-name">${e.name}${denseTag}</div>
              <div class="food-entry-meta">${e.serving}${servingLabel}</div>
            </div>
            <div class="food-entry-cal">${calDisplay}</div>
            <button class="food-entry-del" onclick="removeEntry('${meal}',${i})">×</button>
          </div>`;
        }).join('');

    const icons = {Breakfast:'🌅',Lunch:'☀️',Dinner:'🌙',Snack:'🍎'};
    html += `<div class="meal-group">
      <div class="meal-group-header">
        <span class="meal-group-name">${icons[meal]} ${meal}</span>
        <span class="meal-group-cal">${Math.round(mealCal)} kcal</span>
        <button class="meal-group-add" onclick="openSearchForMeal('${meal}')">+</button>
      </div>
      <div>${entryHtml}</div>
    </div>`;
  });

  document.getElementById('mealGroups').innerHTML = html;
}

function renderHistory() {
  const today = new Date(state.date + 'T12:00:00');
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0,10);
    const dayLog = state.log[ds] || {};
    let totalCal = 0, surfCal = 0;
    Object.values(dayLog).forEach(entries =>
      entries.forEach(e => {
        if (e.class === 'Exercise') surfCal += Math.abs(e.cal * e.qty);
        else totalCal += e.cal * e.qty;
      })
    );
    const effectiveBudget = state.budget + surfCal;
    const pct = Math.min(100, (totalCal / effectiveBudget) * 100);
    const dateLabel = i === 0 ? 'Today' : i === 1 ? 'Yesterday' :
      d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    const journals = (state.journal || []).filter(j => j.date === ds);
    const noteHtml = journals.length > 0
      ? `<div class="history-note">${journals[journals.length-1].text.slice(0,80)}${journals[journals.length-1].text.length > 80 ? '…' : ''}</div>` : '';
    const barColor = pct > 100 ? '#C0392B' : pct > 80 ? '#E67E22' : '#27AE60';
    html += `<div class="history-item" onclick="goToDate('${ds}')">
      <div class="history-date">${dateLabel}</div>
      <div class="history-row">
        <div class="history-cal">${Math.round(totalCal)} <span style="font-size:13px;color:var(--gray);font-weight:400">/ ${Math.round(effectiveBudget)} kcal</span></div>
        ${surfCal > 0 ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--ocean)">🏄 +${Math.round(surfCal)}</span>` : ''}
      </div>
      <div class="history-bar"><div class="history-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      ${noteHtml}
    </div>`;
  }
  document.getElementById('historyList').innerHTML = html || '<div style="color:var(--gray);font-size:13px;padding:20px;text-align:center">No history yet</div>';
}

function renderJournal() {
  const entries = (state.journal || []).slice().reverse().slice(0,15);
  if (entries.length === 0) {
    document.getElementById('journalEntries').innerHTML =
      '<div style="color:var(--gray);font-size:13px;text-align:center;padding:20px">No entries yet. Log daily events, RHR spikes, surf sessions, how you feel.</div>';
    return;
  }
  document.getElementById('journalEntries').innerHTML = entries.map(e => {
    const rhrHtml = e.rhr ? `<span class="journal-entry-rhr">RHR ${e.rhr} bpm</span>` : '';
    return `<div class="journal-entry">
      <div class="journal-entry-date">${e.date} ${e.time || ''}${rhrHtml}</div>
      <div class="journal-entry-text">${e.text}</div>
    </div>`;
  }).join('');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────
function filterFoods() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let filtered = FOODS.filter(f => {
    const matchClass = currentFilter === 'All' || f.class === currentFilter;
    const matchQ = !q || f.name.toLowerCase().includes(q);
    return matchClass && matchQ;
  });
  // Sort: exact match first, then by frequency
  filtered.sort((a,b) => {
    const aExact = a.name.toLowerCase().startsWith(q);
    const bExact = b.name.toLowerCase().startsWith(q);
    if (aExact && !bExact) return -1;
    if (!aExact && bExact) return 1;
    return b.freq - a.freq;
  });
  const isExercise = currentFilter === 'Exercise';
  document.getElementById('resultsList').innerHTML = filtered.slice(0,40).map(f => {
    const isDense = f.dense;
    const calDisplay = f.cal < 0 ? `−${Math.abs(f.cal)} kcal` : `${f.cal} kcal`;
    const metaStr = f.cal < 0
      ? `Exercise · ${f.serving}`
      : `${f.density} cal/g · ${f.serving}`;
    return `<div class="result-item ${isDense ? 'dense-item' : ''}" onclick="openModal(${f.id})">
      <div class="density-dot ${f.cal < 0 ? '' : (isDense ? 'density-warn' : 'density-ok')}"></div>
      <div class="result-info">
        <div class="result-name">${f.name}</div>
        <div class="result-meta">${metaStr}</div>
      </div>
      <div class="result-cal">${calDisplay}</div>
      <button class="result-add" onclick="event.stopPropagation();openModal(${f.id})">+</button>
    </div>`;
  }).join('') || '<div style="color:var(--gray);text-align:center;padding:30px;font-size:13px">No foods found</div>';
}

function setFilter(btn, cls) {
  currentFilter = cls;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterFoods();
}

function openSearchForMeal(meal) {
  selectedMeal = meal;
  showTab('search');
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function openModal(foodId) {
  const food = FOODS.find(f => f.id === foodId);
  if (!food) return;
  pendingFood = food;
  document.getElementById('modalFoodName').textContent = food.name;
  document.getElementById('qtyInput').value = 1;
  updateQtyCal();
  // Pre-select meal if coming from meal group
  document.querySelectorAll('.meal-opt-btn').forEach(b => b.classList.remove('selected'));
  if (selectedMeal) {
    document.querySelectorAll('.meal-opt-btn').forEach(b => {
      if (b.textContent.includes(selectedMeal)) b.classList.add('selected');
    });
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingFood = null;
}

function selectMeal(meal) {
  selectedMeal = meal;
  document.querySelectorAll('.meal-opt-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent.includes(meal));
  });
}

function updateQtyCal() {
  if (!pendingFood) return;
  const qty = parseFloat(document.getElementById('qtyInput').value) || 1;
  const cal = Math.round(pendingFood.cal * qty);
  const display = pendingFood.cal < 0 ? `−${Math.abs(cal)} kcal` : `+${cal} kcal`;
  document.getElementById('qtyCal').textContent = display;
}

function stepQty(delta) {
  const input = document.getElementById('qtyInput');
  const current = parseFloat(input.value) || 1;
  // Step by 0.25 for values under 2, by 0.5 for 2-5, by 1 for above 5
  let step = current < 2 ? 0.25 : current < 5 ? 0.5 : 1;
  let next = Math.round((current + delta * step) * 100) / 100;
  next = Math.max(0.25, Math.min(20, next));
  input.value = next % 1 === 0 ? next : next.toFixed(2).replace(/\.?0+$/, '');
  updateQtyCal();
}

function confirmAdd() {
  if (!pendingFood || !selectedMeal) {
    showToast(selectedMeal ? 'Select a food first' : 'Choose a meal type');
    return;
  }
  const qty = parseFloat(document.getElementById('qtyInput').value) || 1;
  const entry = { ...pendingFood, qty };
  if (!state.log[state.date]) state.log[state.date] = {Breakfast:[],Lunch:[],Dinner:[],Snack:[]};
  if (!state.log[state.date][selectedMeal]) state.log[state.date][selectedMeal] = [];
  state.log[state.date][selectedMeal].push(entry);
  saveState();
  closeModal();
  renderAll();
  const calStr = entry.cal < 0 ? `−${Math.abs(Math.round(entry.cal * qty))}` : `+${Math.round(entry.cal * qty)}`;
  showToast(`${entry.name} → ${selectedMeal} (${calStr} kcal)`);
  showTab('log');
}

function removeEntry(meal, idx) {
  if (!state.log[state.date]?.[meal]) return;
  state.log[state.date][meal].splice(idx, 1);
  saveState();
  renderAll();
}

// ─── JOURNAL ─────────────────────────────────────────────────────────────
function saveJournal() {
  const text = document.getElementById('journalText').value.trim();
  const rhr = document.getElementById('rhrInput').value;
  if (!text) { showToast('Write something first'); return; }
  if (!state.journal) state.journal = [];
  state.journal.push({
    date: state.date,
    time: new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'}),
    text,
    rhr: rhr || null
  });
  document.getElementById('journalText').value = '';
  document.getElementById('rhrInput').value = '';
  saveState();
  renderJournal();
  showToast('Entry saved');
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────
function saveSettings() {
  state.budget = parseInt(document.getElementById('budgetInput').value) || 2400;
  state.surfCal = parseInt(document.getElementById('surfInput').value) || 700;
  saveState();
  renderAll();
  showToast('Settings saved');
}

// ─── NAV ──────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  const tabs = ['log','search','journal','history'];
  const idx = tabs.indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function showDatePicker() {
  const d = prompt('Enter date (YYYY-MM-DD):', state.date);
  if (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    state.date = d;
    if (!state.log[state.date]) state.log[state.date] = {Breakfast:[],Lunch:[],Dinner:[],Snack:[]};
    saveState();
    renderAll();
    showTab('log');
  }
}

function goToDate(ds) {
  state.date = ds;
  if (!state.log[state.date]) state.log[state.date] = {Breakfast:[],Lunch:[],Dinner:[],Snack:[]};
  saveState();
  renderAll();
  showTab('log');
}

// ─── TOAST ────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
